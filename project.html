<section id="#c">
<label for="shape">選擇三角形:</label>
<select id="shape">
  <option value="1">左上</option>
  <option value="2">右上</option>
  <option value="3">左下</option>
  <option value="4">右下</option>
</select>

<label for="size">大小:</label>
<input type="number" id="size" value="5" min="1">

<button onclick="runC()">產生三角形</button>

<pre id="output"></pre>

<script>
async function runC(){
    const size = parseInt(document.getElementById("size").value);
    const shape = parseInt(document.getElementById("shape").value);

    const res = await fetch('/run-triangle', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({shape,size})
    });

    const text = await res.text();
    document.getElementById("output").textContent = text;
}
</script>
